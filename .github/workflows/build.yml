name: Build Shirota Blood Polarity

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC and install SFML via NuGet
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SFML via NuGet
      run: |
        nuget install SFML -Version 2.5.1 -OutputDirectory packages
        # Copy headers
        xcopy packages\SFML.2.5.1\build\native\include\* include\ /E /I /Y
        # Copy libs
        xcopy packages\SFML.2.5.1\build\native\lib\x64\v142\*.lib lib\ /Y
        # Copy DLLs
        xcopy packages\SFML.2.5.1\runtimes\win-x64\native\*.dll . /Y

    - name: Setup MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Create build directory
      run: mkdir build
      working-directory: cpp_game

    - name: Configure with CMake
      run: |
        cmake .. -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DSFML_DIR="${{ github.workspace }}/packages/SFML.2.5.1/build/native/cmake/sfml"
      working-directory: cpp_game/build

    - name: Build
      run: |
        cmake --build . --config Release
      working-directory: cpp_game/build

    - name: Copy SFML DLLs
      run: |
        # Copy DLLs from NuGet package
        copy packages\SFML.2.5.1\runtimes\win-x64\native\*.dll cpp_game\build\Release\
        # Copy executable to build root for artifact
        copy cpp_game\build\Release\ShirotaBloodPolarity.exe cpp_game\build\

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShirotaBloodPolarity-Windows
        path: |
          cpp_game/build/ShirotaBloodPolarity.exe
          cpp_game/build/*.dll
          cpp_game/resources/
          README.md
          cpp_game/ULTIMATE_README.md

    - name: Create Release and Upload Asset
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: cpp_game/build/Release/ShirotaBloodPolarity.exe
        tag_name: v${{ github.run_number }}
        name: Shirota Blood Polarity Ultimate v${{ github.run_number }}
        body: |
          ## 🎉 Shirota: Blood Polarity Ultimate v${{ github.run_number }}

          ### 📥 Download and Play:
          1. Download `ShirotaBloodPolarity.exe` from the Assets section below
          2. Run the executable (no installation required!)
          3. Enjoy the complete story and gameplay!

          ### 🎮 What's Included:
          - ✅ Complete game executable with all features
          - ✅ All required SFML DLLs (no dependencies)
          - ✅ Procedural sprite generation system
          - ✅ Full story with 20+ dialogues and cutscenes
          - ✅ 5 unique characters with distinct abilities
          - ✅ 6 diverse levels with unique environments
          - ✅ 5 game modes (Story, Arcade, Survival, Versus, Training)
          - ✅ Achievement system with 6 unlockable achievements
          - ✅ Save/Load progress functionality
          - ✅ Enhanced audio with 7+ sound effects
          - ✅ Combo system with scaling damage
          - ✅ Special moves and polarity switching

          ### 🖼️ Visual Features:
          - Procedural sprite generation for all characters
          - Dynamic background environments
          - Particle effects and visual feedback
          - Anime-style character designs
          - Smooth animations and transitions

          ### 🎵 Audio Features:
          - Programmatically generated sound effects
          - Victory/defeat music and sound cues
          - Ambient audio for different game states
          - Dialogue sound effects

          ### 🎯 Game Controls:
          - **Arrow Keys / WASD**: Move character
          - **Space**: Attack
          - **Q/E**: Special moves
          - **Shift**: Change polarity
          - **V**: Dash
          - **S / ↓**: Block
          - **ESC**: Pause / Menu

          ### 📖 Story Overview:
          Based on the manga "Please Put Them On, Takamine-san", follow Koushi Shirota as he navigates complex relationships, battles, and personal growth in this ultimate fighting experience.

          ### 🏆 Achievements:
          - First Victory
          - Combo Master (10-hit combo)
          - Polarity Master
          - Survivor (100 rounds)
          - Story Complete
          - Character Master

          ### 💻 System Requirements:
          - Windows 7/8/10/11 (64-bit recommended)
          - 512 MB RAM minimum
          - 50 MB storage space
          - 1200x700 display resolution

          ---
          **Have fun playing Shirota: Blood Polarity Ultimate!** ⚔️✨🎮

          *This is a fan project inspired by "Please Put Them On, Takamine-san" manga.*

      env:
        GITHUB_TOKEN: ${{ github.token }}